services:
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: gigshield-ml
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 25s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigshield-backend
    depends_on:
      ml-service:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "4000"
      FRONTEND_URL: http://localhost:3000
      ML_SERVICE_URL: http://ml-service:5000
      JWT_SECRET: ${JWT_SECRET:-gigshield-dev-secret}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      RAZORPAY_TEST_KEY_ID: ${RAZORPAY_TEST_KEY_ID:-rzp_test_gigshield_demo}
      STRIPE_SANDBOX_PUBLISHABLE_KEY: ${STRIPE_SANDBOX_PUBLISHABLE_KEY:-pk_test_gigshield_demo}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-GigShield Alerts <alerts@gigshield.local>}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
      SMTP_TIMEOUT_MS: ${SMTP_TIMEOUT_MS:-15000}
      EMAIL_MAX_ATTEMPTS: ${EMAIL_MAX_ATTEMPTS:-5}
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigshield-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: unless-stopped
